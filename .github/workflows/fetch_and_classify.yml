name: CS/AM QA Agent — Fetch & Classify Calls

on:
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch only, no output upload)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # Scheduled: every Monday at 8:00 AM ET (13:00 UTC)
  # Runs before Phase 2 grading (9 AM ET) to ensure data is ready
  schedule:
    - cron: '0 13 * * 1'

jobs:
  fetch-and-classify:
    name: Fetch & Classify Fireflies Calls
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Fetch & Classify
        env:
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
        run: |
          python scripts/fetch_and_classify.py

      - name: Show output summary
        run: |
          echo "=== Output files ==="
          ls -lh output/
          echo ""
          echo "=== Call summary ==="
          python -c "
          import json, glob, sys
          files = sorted(glob.glob('output/calls_*.json'))
          if not files:
              print('No output files found')
              sys.exit(1)
          data = json.load(open(files[-1]))
          s = data['summary']
          print(f'Run date:        {data[\"run_date\"]}')
          print(f'Date range:      {data[\"date_range\"][\"from\"]} → {data[\"date_range\"][\"to\"]}')
          print(f'Total fetched:   {s[\"total_fetched\"]}')
          print(f'Team involved:   {s[\"team_involved\"]}')
          print(f'Gradeable:       {s[\"gradeable\"]}')
          print(f'  CS/AM calls:   {s[\"classification_counts\"][\"CS_AM\"]}')
          print(f'  OPS calls:     {s[\"classification_counts\"][\"OPS\"]}')
          print(f'  Internal:      {s[\"classification_counts\"][\"INTERNAL\"]}')
          print(f'  Skipped:       {s[\"classification_counts\"][\"SKIP\"]}')
          print()
          print('Rep breakdown:')
          for email, call_ids in data['rep_call_map'].items():
              name = data['team_emails'][email]
              if call_ids:
                  print(f'  {name:25s}  {len(call_ids)} calls')
          "

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: calls-${{ github.run_id }}
          path: output/calls_*.json
          retention-days: 14

      - name: Notify on failure
        if: failure()
        run: |
          echo "Phase 1 failed. Check logs above."
          # Phase 4 will add Slack failure alerts here
